<head>

    <title>학생 및 담임 조회 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }

<body class="bg-gray-50 min-h-screen p-6">

        <div class="bg-blue-600 p-6 text-white">
            <h1 class="text-2xl font-bold">학생 & 담임 조회 시스템</h1>
            <p class="text-blue-100 mt-2 text-sm">학생의 학번 또는 이름을 입력하여 정보를 확인하세요.</p>
        </div>

        <div class="p-6">
            <!-- 검색 섹션 (데이터 내장됨) -->
            <div id="search-section" class="transition-opacity duration-300">
                <h2 class="font-semibold text-gray-700 mb-4">정보 검색</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="searchInput" placeholder="학번 또는 이름 입력 (예: 10101, 권기백)" 
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button id="searchBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">검색</button>
                </div>

                <!-- 결과 표시 영역 -->
                <div id="results" class="space-y-3">
                    <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </div>
    </div>

        // CSV 파싱 유틸리티 함수
        function parseCSV(text) {
            // BOM(Byte Order Mark) 제거
            text = text.replace(/^\uFEFF/, '');
            const lines = text.trim().split(/\r?\n/);
            return lines.map(line => line.split(',').map(val => val.trim()));
        }

        // 페이지 로드 시 데이터 자동 초기화
        function initializeData() {
            // 담임 데이터 파싱
            const tData = parseCSV(rawTeacherCSV);
            const tStartIdx = tData[0][0].includes('학년') ? 1 : 0;
            for (let i = tStartIdx; i < tData.length; i++) {
                if (tData[i].length >= 3) {
                    const grade = parseInt(tData[i][0].replace(/[^0-9]/g, ''));
                    const classNum = parseInt(tData[i][1].replace(/[^0-9]/g, ''));
                    teachersData[`${grade}-${classNum}`] = tData[i][2];
                }
            }

            // 학생 데이터 파싱
            const sData = parseCSV(rawStudentCSV);
            const sStartIdx = sData[0][0].includes('학번') ? 1 : 0;
            for (let i = sStartIdx; i < sData.length; i++) {
                if (sData[i].length >= 2) {
                    studentsData.push({ id: sData[i][0], name: sData[i][1] });
                }
            }
        }

        // 스크립트 실행 시 바로 초기화
        initializeData();

        // 검색 실행 함수
        function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ''; // 기존 결과 초기화

            if (!query) {
                resultsDiv.innerHTML = '<p class="text-gray-500 text-center py-4">검색어를 입력해주세요.</p>';
                return;
            }

            // 이름 또는 학번에 검색어가 '포함'된 학생 찾기 (부분 일치 검색)
            const matchedStudents = studentsData.filter(student => 
                student.id.includes(query) || student.name.includes(query)
            );

            if (matchedStudents.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-50 text-red-600 p-4 rounded-lg text-center">
                        '${query}'에 대한 검색 결과가 없습니다.
                    </div>`;
                return;
            }

            // 결과 화면에 출력
            matchedStudents.forEach(student => {
                // 학번(예: 10101)에서 학년과 반 추출
                const grade = student.id.charAt(0);
                const classNum = parseInt(student.id.substring(1, 3), 10);
                
                // 담임 선생님 이름 찾기
                const teacherName = teachersData[`${grade}-${classNum}`] || '<span class="text-red-500">정보 없음</span>';

                const card = document.createElement('div');
                card.className = 'border border-gray-200 p-4 rounded-xl flex items-center justify-between bg-white shadow-sm';
                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">학생</span>
                            <span class="font-bold text-lg text-gray-800">${student.name}</span>
                        </div>
                        <p class="text-gray-600 text-sm tracking-wide">학번: <span class="font-mono text-gray-800">${student.id}</span></p>
                    </div>
                    <div class="text-right border-l pl-4 border-gray-200">
                        <span class="block text-xs text-gray-500 mb-1">담임 선생님</span>
                        <span class="font-bold text-gray-800">${teacherName}</span>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        }

        // 이벤트 리스너 연결
        document.getElementById('searchBtn').addEventListener('click', executeSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') executeSearch();
        });
